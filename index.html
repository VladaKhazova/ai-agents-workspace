<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Agents Workspace</title>
</head>
<body>
<style>
    :root {
        --bg: #f6f1e8;
        --bg-accent: #efe7d8;
        --surface: #fffdf8;
        --surface-alt: #fff8ef;
        --text: #1f1d1a;
        --muted: #6b655d;
        --border: #1f1d1a;
        --accent-blue: #d9ecff;
        --accent-yellow: #ffe9a8;
        --accent-green: #d8f5d0;
        --accent-pink: #ffd9ea;
        --idle-bg: #ece7dd;
        --idle-text: #5d584f;
        --active-bg: #ffe28a;
        --active-text: #5a4300;
        --done-bg: #cfeec6;
        --done-text: #244c1f;
        --radius-lg: 24px;
        --radius-md: 18px;
        --radius-sm: 14px;
    }

    * {
        box-sizing: border-box;
    }

    html {
        font-size: 16px;
    }

    body {
        margin: 0;
        font-family: "Arial", "Helvetica", sans-serif;
        color: var(--text);
        background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.55), transparent 30%),
                linear-gradient(180deg, var(--bg) 0%, var(--bg-accent) 100%);
    }

    button,
    textarea {
        font: inherit;
    }

    button {
        cursor: pointer;
    }

    button:disabled {
        opacity: 0.7;
        cursor: not-allowed;
    }

    button:focus-visible,
    textarea:focus-visible {
        outline: 3px solid rgba(74, 144, 226, 0.35);
        outline-offset: 3px;
    }

    .page {
        width: min(1200px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0 52px;
    }

    .hero {
        margin-bottom: 24px;
        padding: 28px;
        background: var(--surface);
        border: 3px solid var(--border);
        border-radius: 28px 24px 26px 22px;
        transform: rotate(-0.3deg);
        position: relative;
    }

    .hero::after {
        content: "";
        position: absolute;
        inset: 10px;
        border: 1px dashed rgba(31, 29, 26, 0.18);
        border-radius: 22px;
        pointer-events: none;
    }

    .hero__eyebrow {
        display: inline-block;
        margin: 0 0 12px;
        padding: 6px 12px;
        background: var(--accent-yellow);
        border: 2px solid var(--border);
        border-radius: 999px;
        font-size: 0.9rem;
        font-weight: 700;
        transform: rotate(-1.2deg);
    }

    .hero__title {
        margin: 0 0 12px;
        font-size: 2.15rem;
        line-height: 1.15;
        font-weight: 800;
        max-width: 900px;
    }

    .hero__text {
        margin: 0;
        max-width: 820px;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.65;
    }

    .panel {
        position: relative;
        margin-bottom: 22px;
        padding: 22px;
        background: var(--surface);
        border: 3px solid var(--border);
        border-radius: 22px 18px 24px 20px;
    }

    .panel::before {
        content: "";
        position: absolute;
        inset: 8px;
        border: 1px dashed rgba(31, 29, 26, 0.12);
        border-radius: 14px;
        pointer-events: none;
    }

    .section-title {
        display: inline-block;
        margin: 0 0 18px;
        padding: 4px 10px;
        background: var(--accent-blue);
        border: 2px solid var(--border);
        border-radius: 12px 10px 14px 10px;
        font-size: 1.2rem;
        font-weight: 800;
        transform: rotate(-0.7deg);
    }

    .label {
        display: block;
        margin-bottom: 8px;
        font-weight: 700;
    }

    .textarea {
        width: 100%;
        min-height: 130px;
        resize: vertical;
        padding: 16px;
        border: 3px solid var(--border);
        border-radius: 18px 16px 14px 18px;
        background: #fffefb;
        color: var(--text);
        line-height: 1.6;
        box-shadow: inset 0 2px 0 rgba(31, 29, 26, 0.05);
    }

    .textarea::placeholder {
        color: #8a8378;
    }

    .button-row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 16px;
    }

    .button {
        min-height: 46px;
        padding: 0 18px;
        border: 3px solid var(--border);
        border-radius: 16px 14px 18px 14px;
        font-weight: 700;
        box-shadow: 0 5px 0 rgba(31, 29, 26, 0.16);
        transition: transform 0.12s ease;
    }

    .button:hover {
        transform: translateY(-1px) rotate(-0.4deg);
    }

    .button:active {
        transform: translateY(2px);
        box-shadow: 0 2px 0 rgba(31, 29, 26, 0.16);
    }

    .button--primary {
        background: var(--accent-green);
        color: var(--text);
    }

    .button--secondary {
        background: var(--accent-pink);
        color: var(--text);
    }

    .examples {
        margin-top: 20px;
    }

    .examples__title {
        margin: 0 0 10px;
        font-weight: 700;
    }

    .examples__list {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
    }

    .example-chip {
        padding: 10px 14px;
        border: 2px solid var(--border);
        border-radius: 999px;
        background: #fff3be;
        color: var(--text);
        box-shadow: 0 3px 0 rgba(31, 29, 26, 0.12);
        transition: transform 0.12s ease;
    }

    .example-chip:nth-child(2n) {
        background: #d9ecff;
    }

    .example-chip:nth-child(3n) {
        background: #ffd9ea;
    }

    .example-chip:hover {
        transform: rotate(-1deg) translateY(-1px);
    }

    .agents-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
    }

    .card {
        padding: 16px;
        border: 3px solid var(--border);
        border-radius: 18px 16px 20px 14px;
        background: var(--surface-alt);
        box-shadow: 0 6px 0 rgba(31, 29, 26, 0.14);
        transform: rotate(-0.6deg);
    }

    .card:nth-child(even) {
        transform: rotate(0.6deg);
    }

    .card__header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
        margin-bottom: 12px;
    }

    .card__title {
        margin: 0 0 4px;
        font-size: 1.05rem;
        font-weight: 800;
    }

    .card__subtitle {
        margin: 0;
        color: var(--muted);
        font-size: 0.94rem;
    }

    .card__text {
        margin: 0;
        line-height: 1.6;
        color: #454039;
    }

    .status-badge {
        display: inline-flex;
        align-items: center;
        min-height: 32px;
        padding: 0 12px;
        border: 2px solid var(--border);
        border-radius: 999px;
        font-size: 0.82rem;
        font-weight: 800;
        white-space: nowrap;
        box-shadow: 0 2px 0 rgba(31, 29, 26, 0.1);
    }

    .status-badge--idle {
        background: var(--idle-bg);
        color: var(--idle-text);
    }

    .status-badge--active {
        background: var(--active-bg);
        color: var(--active-text);
    }

    .status-badge--done {
        background: var(--done-bg);
        color: var(--done-text);
    }

    .content-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }

    .stack {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .item-card {
        padding: 15px;
        border: 3px solid var(--border);
        border-radius: 18px 14px 20px 16px;
        background: #fffdf8;
        box-shadow: 0 5px 0 rgba(31, 29, 26, 0.12);
    }

    .item-card:nth-child(2n) {
        transform: rotate(0.35deg);
    }

    .item-card:nth-child(2n + 1) {
        transform: rotate(-0.35deg);
    }

    .item-card__header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
    }

    .item-card__title {
        margin: 0 0 6px;
        font-size: 1rem;
        font-weight: 800;
    }

    .item-card__subtitle {
        margin: 0;
        color: var(--muted);
        font-size: 0.92rem;
    }

    .item-card__text {
        margin: 12px 0 0;
        line-height: 1.6;
        color: #322f2b;
    }

    .result-box {
        margin: 0;
        padding: 18px;
        white-space: pre-wrap;
        overflow-x: auto;
        line-height: 1.65;
        color: var(--text);
        background: #fff7dc;
        border: 3px solid var(--border);
        border-radius: 18px 16px 22px 16px;
        box-shadow: inset 0 0 0 1px rgba(31, 29, 26, 0.08);
        font-family: inherit;
    }

    .empty-text {
        margin: 0;
        color: var(--muted);
        line-height: 1.55;
    }

    @media (max-width: 900px) {
        .agents-grid,
        .content-grid {
            grid-template-columns: 1fr;
        }

        .hero__title {
            font-size: 1.7rem;
        }
    }

    @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
            animation: none !important;
            transition: none !important;
            scroll-behavior: auto !important;
        }

        .card,
        .item-card,
        .hero,
        .section-title,
        .hero__eyebrow {
            transform: none !important;
        }
    }
</style>
<div id="root"></div>
<script type="module" src="/src/main.tsx"></script>
</body>
</html>
